<!DOCTYPE html>
<html>
<head>
    <title>ClearKey Master Practice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #121212; color: white; text-align: center; font-family: sans-serif; }
        #video { width: 90%; max-width: 800px; background: #000; margin-top: 20px; border: 2px solid #333; }
        .btn { background: #2ecc71; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; margin-top: 50px; }
        .btn:hover { background: #27ae60; }
        #status { color: #f1c40f; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>DRM ClearKey Practice</h1>
    
    <!-- Button isliye taaki browser block na kare -->
    <button id="startBtn" class="btn">Click to Start Player</button>
    <div id="status">Status: Waiting for User...</div>

    <video id="video" controls autoplay playsinline></video>

    <script>
        const manifestUri = 'https://bitmovin-a.akamaihd.net/content/art-of-motion_drm/mpd-progressive/clear-key.mpd';
        
        // KID aur KEY (Hex format mein)
        const kid = '1c2a3b4d5e6f7a8b9c0d1e2f3a4b5c6d';
        const key = 'd1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6';

        async function initPlayer() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');

            const player = new shaka.Player(video);

            // Configure DRM
            player.configure({
                drm: {
                    clearKeys: {
                        [kid]: key
                    }
                }
            });

            try {
                await player.load(manifestUri);
                status.innerText = "Status: PLAYING SUCCESSFULLY ✓";
                status.style.color = "#2ecc71";
                startBtn.style.display = "none"; // Hide button after success
                console.log('Success!');
            } catch (e) {
                status.innerText = "Status: ERROR - " + e.code;
                status.style.color = "#e74c3c";
                console.error('Error:', e);
            }
        }

        // Click event listener
        document.getElementById('startBtn').addEventListener('click', initPlayer);
    </script>

</body>
</html>
