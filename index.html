<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearKey Practice Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.0/shaka-player.compiled.js"></script>
    
    <style>
        body { margin: 0; background: #000; font-family: Arial; }
        #video { width: 100vw; height: 100vh; }
        .info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="info">
        <strong>ClearKey Test Player</strong><br>
        Status: <span id="status">Loading...</span>
    </div>

    <video id="video" controls autoplay></video>

    <script>
        const manifestUri = 'https://bitmovin-a.akamaihd.net/content/art-of-motion_drm/mpd-progressive/clear-key.mpd';

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const status = document.getElementById('status');

            // ClearKey Configuration
            player.configure({
                drm: {
                    clearKeys: {
                        '1c2a3b4d5e6f7a8b9c0d1e2f3a4b5c6d': 'd1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6'
                    }
                }
            });

            try {
                await player.load(manifestUri);
                status.textContent = "Playing Successfully ✓";
                console.log("ClearKey Stream Started!");
            } catch (error) {
                status.textContent = "Failed ✗";
                console.error("Error:", error);
            }
        }

        window.onload = initPlayer;
    </script>
</body>
</html>
